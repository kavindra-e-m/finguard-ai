# FinGuard AI - Spring Boot Application Configuration

# Application
spring.application.name=FinGuard AI Backend
server.port=8081

# Database Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/finguard_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:finguard_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:K@VICLOWn17}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Connection Pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000

# JWT Configuration
jwt.secret=${JWT_SECRET:your-512-bit-secret-key-for-jwt-signing-finguard-ai-application-2024-production-environment}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ML Service Configuration
ml.service.url=${ML_SERVICE_URL:http://localhost:8000}

# CORS Configuration
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# Logging
logging.level.com.finguard=INFO
logging.level.org.springframework.security=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized

# Server Error Handling
server.error.include-message=always
server.error.include-binding-errors=always

# Jackson
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
spring.jackson.time-zone=UTC
